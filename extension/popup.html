<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f0f0ed;
      --bg-card: #ffffff;
      --accent: #4b6ef5;
      --text-main: #111111;
      --text-muted: #888888;
      --border: #e5e5e0;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --radius: 18px;
    }

    body {
      width: 340px;
      margin: 0;
      font-family: 'Sora', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      padding: 24px;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 1rem;
    }

    h1 {
      font-size: 1.1rem;
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .value {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-main);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .value:last-child {
      margin-bottom: 0;
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 12px rgba(75, 110, 245, 0.2);
    }

    .btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(75, 110, 245, 0.3);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn:disabled {
      background: #ccc;
      box-shadow: none;
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 14px;
      font-size: 0.8rem;
      text-align: center;
      font-weight: 600;
    }

    .success { color: #10b981; }
    .error { color: #f43f5e; }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .auth-status {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .dashboard-link {
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    
    .dashboard-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo-icon">T</div>
    <h1>trkr Clipper</h1>
  </div>

  <div id="job-info" class="card">
    <div class="label">Company</div>
    <div id="company" class="value">Detecting...</div>

    <div class="label">Job Title</div>
    <div id="title" class="value">Detecting...</div>
  </div>

  <button id="save-btn" class="btn">Add to trkr</button>
  <div id="status"></div>

  <div class="footer">
    <div id="auth-status" class="auth-status">Checking...</div>
    <a href="http://localhost:3000" target="_blank" class="dashboard-link">Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
